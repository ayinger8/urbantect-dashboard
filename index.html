<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard UrbanTect</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f9f4;
    --surface:   #ffffff;
    --border:    #c8d9b0;
    --border-lt: #e2edd0;
    --green-1:   #1a3a0f;
    --green-2:   #2d6a10;
    --green-3:   #4a9e22;
    --green-4:   #7ec94a;
    --green-5:   #d4edaa;
    --green-6:   #eef6e2;
    --text-h:    #0f2208;
    --text-b:    #2a3d1c;
    --text-m:    #5a7a42;
    --text-lt:   #8aaa6a;

    --s-sin:     #e8e8e8;
    --s-sin-t:   #555;
    --s-proc:    #fff3cd;
    --s-proc-t:  #7a5000;
    --s-fin:     #d4edaa;
    --s-fin-t:   #1a3a0f;
    --s-du:      #cce5ff;
    --s-du-t:    #003d80;
    --s-fac:     #e8d5f5;
    --s-fac-t:   #4a007a;
    --s-esp:     #ffe4c4;
    --s-esp-t:   #7a3500;
    --s-pag:     #c3f0d0;
    --s-pag-t:   #0a4020;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Montserrat', sans-serif;
    color: var(--text-b);
    min-height: 100vh;
    padding: 0;
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--border);
    border-top-color: var(--green-2);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-text {
    font-size: 16px;
    color: var(--text-m);
    font-weight: 500;
  }

  /* ERROR */
  .error-container {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: var(--surface);
    border: 2px solid #f44336;
    border-radius: 12px;
    text-align: center;
  }
  .error-title {
    color: #d32f2f;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .error-message {
    color: var(--text-b);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* NAVIGATION */
  .nav-bar {
    background: var(--green-1);
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--green-2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -.01em;
  }
  .nav-logo-sub {
    font-size: 9px;
    color: var(--green-5);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .nav-blocks {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .nav-block-btn {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: var(--green-5);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Montserrat', sans-serif;
  }
  .nav-block-btn:hover {
    background: rgba(255,255,255,.15);
    border-color: rgba(255,255,255,.3);
  }
  .nav-block-btn.active {
    background: var(--green-4);
    border-color: var(--green-4);
    color: var(--green-1);
  }

  /* PAGE */
  .page { 
    max-width: 1100px; 
    margin: 0 auto; 
    padding: 48px 32px 80px; 
    display: none;
  }
  .page.active {
    display: block;
  }

  /* HEADER */
  header {
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start;
    border-bottom: 2px solid var(--green-1);
    padding-bottom: 24px; 
    margin-bottom: 36px;
    gap: 20px;
  }
  .eyebrow {
    font-size: 12px; 
    letter-spacing: .16em; 
    text-transform: uppercase;
    color: var(--text-m); 
    margin-bottom: 8px; 
    font-weight: 600;
  }
  h1 {
    font-size: 38px; 
    font-weight: 800;
    color: var(--text-h); 
    line-height: 1.1; 
    letter-spacing: -.01em;
  }
  .header-meta {
    display: flex; 
    gap: 20px; 
    margin-top: 10px; 
    flex-wrap: wrap;
  }
  .meta-pill {
    font-size: 13px; 
    color: var(--text-m);
    background: var(--green-6); 
    border: 1px solid var(--border);
    padding: 4px 12px; 
    border-radius: 20px;
  }

  /* KPI STRIP */
  .kpi-strip {
    display: grid; 
    grid-template-columns: repeat(4, 1fr);
    gap: 14px; 
    margin-bottom: 40px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--green-2);
    border-radius: 6px;
    padding: 20px 22px;
  }
  .kpi-card.accent { 
    border-top-color: var(--green-4); 
  }
  .kpi-label {
    font-size: 11px; 
    letter-spacing: .1em; 
    text-transform: uppercase;
    color: var(--text-m); 
    margin-bottom: 8px; 
    font-weight: 600;
  }
  .kpi-value {
    font-size: 30px; 
    font-weight: 700; 
    color: var(--text-h);
  }
  .kpi-value.green { 
    color: var(--green-2); 
  }
  .kpi-sub {
    font-size: 12px; 
    color: var(--text-lt); 
    margin-top: 4px;
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px; 
    letter-spacing: .16em; 
    text-transform: uppercase;
    color: var(--text-m); 
    margin-bottom: 16px; 
    font-weight: 700;
    display: flex; 
    align-items: center; 
    gap: 12px;
  }
  .section-title::after { 
    content:''; 
    flex:1; 
    height:1px; 
    background: var(--border); 
  }

  /* STATIONS GRID */
  .stations-grid {
    display: grid; 
    grid-template-columns: 1fr;
    gap: 18px; 
    margin-bottom: 44px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-head {
    background: var(--green-1);
    padding: 18px 28px;
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    gap: 12px;
  }
  .card-name {
    font-size: 28px; 
    font-weight: 800; 
    color: #ffffff;
    line-height: 1.1; 
    letter-spacing: -.01em;
  }
  .card-city {
    font-size: 14px; 
    color: var(--green-5); 
    margin-top: 4px; 
    font-weight: 500;
  }
  .card-dates {
    text-align: right; 
    flex-shrink: 0;
  }
  .card-dates .days {
    font-size: 36px; 
    font-weight: 800; 
    color: var(--green-4); 
    line-height: 1;
  }
  .card-dates .days-label {
    font-size: 12px; 
    color: var(--green-5); 
    letter-spacing: .06em; 
    font-weight: 600;
  }
  .card-dates .date-range {
    font-size: 11px; 
    color: var(--green-5); 
    margin-top: 4px; 
    letter-spacing: .04em;
  }
  .card-body {
    padding: 24px 28px;
  }
  .data-row {
    display: grid;
    gap: 20px;
    align-items: end;
  }
  .data-item {
    border-right: 1px solid var(--border-lt);
    padding-right: 20px;
    margin-right: 0;
  }
  .data-item:last-child {
    border-right: none;
    padding-right: 0;
  }
  .data-label {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-m);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .data-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-h);
  }
  .data-value.mid {
    font-size: 20px;
  }
  .data-value.green {
    color: var(--green-2);
  }
  .status-label-text {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-m);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .status-badge {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    display: inline-block;
    min-width: 140px;
  }

  /* STATUS COLORS */
  .status-sin { background: var(--s-sin); color: var(--s-sin-t); }
  .status-proc { background: var(--s-proc); color: var(--s-proc-t); }
  .status-fin { background: var(--s-fin); color: var(--s-fin-t); }
  .status-du { background: var(--s-du); color: var(--s-du-t); }
  .status-fac { background: var(--s-fac); color: var(--s-fac-t); }
  .status-esp { background: var(--s-esp); color: var(--s-esp-t); }
  .status-pag { background: var(--s-pag); color: var(--s-pag-t); }

  /* SUMMARY BOX */
  .summary-box {
    background: var(--green-1);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .summary-head {
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(255,255,255,.1);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }
  .summary-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--green-5);
    margin-bottom: 6px;
  }
  .summary-title {
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -.02em;
    line-height: 1;
  }
  .summary-subtitle {
    font-size: 14px;
    font-weight: 500;
    color: var(--green-5);
    margin-top: 6px;
  }
  .summary-badges {
    display: flex;
    gap: 20px;
    text-align: center;
  }
  .summary-badge {
    background: rgba(255,255,255,.07);
    border-radius: 8px;
    padding: 14px 22px;
  }
  .summary-badge-value {
    font-size: 36px;
    font-weight: 800;
    color: var(--green-4);
    line-height: 1;
  }
  .summary-badge-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-5);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .summary-kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .summary-kpi {
    padding: 28px 32px;
    border-right: 1px solid rgba(255,255,255,.1);
  }
  .summary-kpi:last-child {
    border-right: none;
  }
  .summary-kpi:nth-child(2) {
    background: rgba(255,255,255,.04);
  }
  .summary-kpi:nth-child(3) {
    background: rgba(168,224,99,.08);
  }
  .summary-kpi-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--green-5);
    margin-bottom: 10px;
  }
  .summary-kpi-value {
    font-size: 42px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -.02em;
  }
  .summary-kpi-value.accent {
    color: var(--green-4);
  }
  .summary-kpi-sub {
    font-size: 13px;
    color: var(--green-5);
    margin-top: 6px;
    font-weight: 500;
  }

  /* COMPOSITION BAR */
  .composition-section {
    padding: 24px 32px;
  }
  .composition-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--green-5);
    margin-bottom: 12px;
  }
  .composition-bar {
    display: flex;
    height: 44px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .composition-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .composition-legend {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }
  .composition-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .composition-legend-box {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .composition-legend-label {
    font-size: 13px;
    color: var(--green-5);
    font-weight: 500;
  }
  .composition-legend-value {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    margin-left: 4px;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px 32px;
    color: var(--text-lt);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .kpi-strip {
      grid-template-columns: repeat(2, 1fr);
    }
    .summary-kpis {
      grid-template-columns: 1fr;
    }
    .summary-kpi {
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .summary-kpi:last-child {
      border-bottom: none;
    }
    .nav-bar {
      flex-direction: column;
      gap: 16px;
    }
    h1 {
      font-size: 28px;
    }
    .card-head {
      flex-direction: column;
      align-items: flex-start;
    }
    .card-dates {
      text-align: left;
    }
  }
</style>
</head>
<body>

<!-- LOADING STATE -->
<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <div class="loading-text">Cargando datos desde Google Sheets...</div>
</div>

<!-- ERROR STATE -->
<div class="error-container" id="errorState" style="display:none;">
  <div class="error-title">⚠️ Error al cargar datos</div>
  <div class="error-message" id="errorMessage"></div>
</div>

<!-- NAVIGATION BAR -->
<nav class="nav-bar" id="navBar" style="display:none;">
  <div>
    <div class="nav-logo">URBANTECT</div>
    <div class="nav-logo-sub">Seguimiento de Pagos</div>
  </div>
  <div class="nav-blocks" id="navBlocks"></div>
</nav>

<!-- CONTENT CONTAINER -->
<div id="contentContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN - EDITA ESTO
// ═══════════════════════════════════════════════════════════════════════════

const CONFIG = {
  // REEMPLAZA ESTE ID CON EL DE TU GOOGLE SHEET
  // El ID es la parte de la URL entre /d/ y /edit
  // Ejemplo: https://docs.google.com/spreadsheets/d/ABC123XYZ/edit
  // El ID sería: ABC123XYZ
  SHEET_ID: '14w-qDQ6ocCSzkKweYEh2Dl5ipD0GYLe8xSOZpa66Ias',
  
  // Nombres de las pestañas (deben coincidir exactamente)
  SHEETS: {
    CONFIG: 'CONFIG_BLOQUES',
    CATALOG: 'CATALOGO_ESTATUS'
  }
};

// ═══════════════════════════════════════════════════════════════════════════
// FUNCIONES HELPER
// ═══════════════════════════════════════════════════════════════════════════

function formatCurrency(value) {
  if (!value || isNaN(value)) return '$0';
  return '$' + Math.round(value).toLocaleString('es-MX');
}

function formatPercent(value) {
  if (!value || isNaN(value)) return '0%';
  return (value * 100).toFixed(2) + '%';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
  return date.getDate().toString().padStart(2, '0') + ' ' + months[date.getMonth()];
}

function calculateDays(startDate, endDate) {
  if (!startDate || !endDate) return 0;
  const start = new Date(startDate);
  const end = new Date(endDate);
  const diff = Math.abs(end - start);
  return Math.ceil(diff / (1000 * 60 * 60 * 24)) + 1;
}

function getStatusClass(status) {
  const statusMap = {
    'Sin iniciar': 'status-sin',
    'En proceso': 'status-proc',
    'Finalizada': 'status-fin',
    'Duform': 'status-du',
    'Factura': 'status-fac',
    'En espera de pago': 'status-esp',
    'Pagado': 'status-pag'
  };
  return statusMap[status] || 'status-sin';
}

// ═══════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS API
// ═══════════════════════════════════════════════════════════════════════════

async function fetchSheetData(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  
  try {
    const response = await fetch(url);
    const text = await response.text();
    
    // Google Sheets envía JSONP, necesitamos extraer el JSON
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
    if (!jsonMatch) throw new Error('Formato de respuesta inválido');
    
    const data = JSON.parse(jsonMatch[1]);
    
    if (data.status === 'error') {
      throw new Error(data.errors[0].detailed_message || 'Error al leer el Sheet');
    }
    
    return parseSheetData(data);
  } catch (error) {
    console.error('Error fetching sheet:', sheetName, error);
    throw error;
  }
}

function parseSheetData(data) {
  const rows = data.table.rows;
  const cols = data.table.cols;
  
  const result = [];
  
  for (let i = 0; i < rows.length; i++) {
    const row = {};
    for (let j = 0; j < cols.length; j++) {
      const cell = rows[i].c[j];
      const label = cols[j].label || `col_${j}`;
      row[label] = cell ? cell.v : null;
    }
    result.push(row);
  }
  
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA PROCESSING
// ═══════════════════════════════════════════════════════════════════════════

async function loadAllData() {
  try {
    // Cargar configuración de bloques
    const configData = await fetchSheetData(CONFIG.SHEETS.CONFIG);
    
    // Filtrar filas válidas (que tengan ID_BLOQUE)
    const blocks = configData.filter(row => row.ID_BLOQUE && row.ID_BLOQUE.startsWith('BLQ-'));
    
    if (blocks.length === 0) {
      throw new Error('No se encontraron bloques configurados en CONFIG_BLOQUES');
    }
    
    // Cargar datos de cada bloque
    const blocksWithData = [];
    
    for (const block of blocks) {
      try {
        const sheetName = `BLOQUE_${block.NOMBRE_BLOQUE.toUpperCase().replace(/\s/g, '_')}`;
        const blockData = await fetchSheetData(sheetName);
        
        // Filtrar estaciones válidas (que tengan ID_ESTACION)
        const stations = blockData.filter(row => row.ID_ESTACION && row.ID_ESTACION.startsWith('ES-'));
        
        if (stations.length > 0) {
          blocksWithData.push({
            ...block,
            stations: stations
          });
        }
      } catch (error) {
        console.warn(`No se pudo cargar el bloque ${block.NOMBRE_BLOQUE}:`, error);
      }
    }
    
    if (blocksWithData.length === 0) {
      throw new Error('No se pudieron cargar datos de ningún bloque');
    }
    
    return blocksWithData;
    
  } catch (error) {
    console.error('Error loading data:', error);
    throw error;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════════════════════

function renderNavigation(blocks) {
  const navBlocks = document.getElementById('navBlocks');
  navBlocks.innerHTML = blocks.map((block, index) => `
    <button class="nav-block-btn ${index === 0 ? 'active' : ''}" onclick="switchBlock(${index})">
      ${block.NOMBRE_BLOQUE}
    </button>
  `).join('');
}

function renderBlockPage(block, blockIndex) {
  const stations = block.stations;
  
  // Calcular totales
  const totalStations = stations.length;
  const totalDays = stations.reduce((sum, s) => sum + (parseInt(s.DIAS) || 0), 0);
  const totalMonto = stations.reduce((sum, s) => sum + (parseFloat(s.MONTO_CONTRACTUAL) || 0), 0);
  const totalIsrael = stations.reduce((sum, s) => sum + (parseFloat(s.HON_ISRAEL) || 0), 0);
  const totalCesar = stations.reduce((sum, s) => sum + (parseFloat(s.HON_CESAR) || 0), 0);
  const utilidadSinCesar = totalMonto - totalIsrael;
  const utilidadConCesar = totalMonto - totalIsrael - totalCesar;
  const margenSinCesar = utilidadSinCesar / totalMonto;
  const margenConCesar = utilidadConCesar / totalMonto;
  
  // Calcular porcentajes para barra de composición
  const pctIsrael = (totalIsrael / totalMonto * 100).toFixed(2);
  const pctCesar = (totalCesar / totalMonto * 100).toFixed(2);
  const pctUtilidad = (utilidadConCesar / totalMonto * 100).toFixed(2);
  
  return `
    <div class="page ${blockIndex === 0 ? 'active' : ''}" id="page-${blockIndex}">
      
      <!-- HEADER -->
      <header>
        <div class="header-left">
          <div class="eyebrow">Seguimiento de Pagos</div>
          <h1>${block.NOMBRE_BLOQUE}</h1>
          <div class="header-meta">
            <span class="meta-pill">🏢 ${block.CLIENTE}</span>
            <span class="meta-pill">📅 ${block.PERIODO}</span>
            <span class="meta-pill">👷 ${block.CUADRILLA}</span>
            <span class="meta-pill">📍 ${block.UBICACION}</span>
          </div>
        </div>
      </header>

      <!-- KPI STRIP -->
      <div class="kpi-strip">
        <div class="kpi-card">
          <div class="kpi-label">Estaciones</div>
          <div class="kpi-value">${totalStations}</div>
          <div class="kpi-sub">Total en bloque</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Días Totales</div>
          <div class="kpi-value">${totalDays}</div>
          <div class="kpi-sub">Duración acumulada</div>
        </div>
        <div class="kpi-card accent">
          <div class="kpi-label">Monto Contractual</div>
          <div class="kpi-value green">${formatCurrency(totalMonto)}</div>
          <div class="kpi-sub">Base del bloque</div>
        </div>
        <div class="kpi-card accent">
          <div class="kpi-label">Utilidad Neta</div>
          <div class="kpi-value green">${formatCurrency(utilidadConCesar)}</div>
          <div class="kpi-sub">Margen ${formatPercent(margenConCesar)}</div>
        </div>
      </div>

      <!-- STATIONS SECTION -->
      <div class="section-title">Estaciones del Bloque</div>
      <div class="stations-grid">
        ${stations.map(station => renderStationCard(station)).join('')}
      </div>

      <!-- SUMMARY BOX -->
      <div class="summary-box">
        
        <!-- Header -->
        <div class="summary-head">
          <div>
            <div class="summary-eyebrow">Resumen General</div>
            <div class="summary-title">${block.NOMBRE_BLOQUE}</div>
            <div class="summary-subtitle">${block.PERIODO} · ${block.CUADRILLA} · ${block.UBICACION}</div>
          </div>
          <div class="summary-badges">
            <div class="summary-badge">
              <div class="summary-badge-value">${totalStations}</div>
              <div class="summary-badge-label">Estaciones</div>
            </div>
            <div class="summary-badge">
              <div class="summary-badge-value">${totalDays}</div>
              <div class="summary-badge-label">Días</div>
            </div>
          </div>
        </div>

        <!-- KPIs principales -->
        <div class="summary-kpis">
          <div class="summary-kpi">
            <div class="summary-kpi-label">Monto Contractual</div>
            <div class="summary-kpi-value">${formatCurrency(totalMonto)}</div>
            <div class="summary-kpi-sub">Base total del bloque · 100%</div>
          </div>
          <div class="summary-kpi">
            <div class="summary-kpi-label">Utilidad sin César</div>
            <div class="summary-kpi-value accent">${formatCurrency(utilidadSinCesar)}</div>
            <div class="summary-kpi-sub">Margen bruto · ${formatPercent(margenSinCesar)}</div>
          </div>
          <div class="summary-kpi">
            <div class="summary-kpi-label">Utilidad con César</div>
            <div class="summary-kpi-value accent">${formatCurrency(utilidadConCesar)}</div>
            <div class="summary-kpi-sub">Margen neto · ${formatPercent(margenConCesar)}</div>
          </div>
        </div>

        <!-- Composition Bar -->
        <div class="composition-section">
          <div class="composition-eyebrow">Composición del Monto Contractual</div>
          <div class="composition-bar">
            <div class="composition-segment" style="width:${pctIsrael}%; background:#0d2208; color:var(--green-5);">
              Israel ${pctIsrael}%
            </div>
            <div class="composition-segment" style="width:${pctCesar}%; background:var(--green-3);"></div>
            <div class="composition-segment" style="width:${pctUtilidad}%; background:var(--green-4); color:var(--green-1);">
              Utilidad ${pctUtilidad}%
            </div>
          </div>
          <div class="composition-legend">
            <div class="composition-legend-item">
              <div class="composition-legend-box" style="background:#0d2208;"></div>
              <span class="composition-legend-label">Hon. Israel</span>
              <span class="composition-legend-value">${formatCurrency(totalIsrael)} · ${pctIsrael}%</span>
            </div>
            <div class="composition-legend-item">
              <div class="composition-legend-box" style="background:var(--green-3);"></div>
              <span class="composition-legend-label">Hon. César</span>
              <span class="composition-legend-value">${formatCurrency(totalCesar)} · ${pctCesar}%</span>
            </div>
            <div class="composition-legend-item">
              <div class="composition-legend-box" style="background:var(--green-4);"></div>
              <span class="composition-legend-label">Utilidad neta</span>
              <span class="composition-legend-value">${formatCurrency(utilidadConCesar)} · ${pctUtilidad}%</span>
            </div>
          </div>
        </div>

      </div><!-- /summary-box -->

      <!-- FOOTER -->
      <footer>
        <span>URBANTECT · SEGUIMIENTO DE PAGOS · ${block.NOMBRE_BLOQUE.toUpperCase()}</span>
        <span>${block.PERIODO.toUpperCase()} · ${block.CUADRILLA.toUpperCase()}</span>
        <span>${totalStations} ESTACIONES · ${block.UBICACION.toUpperCase()}</span>
      </footer>

    </div><!-- /page -->
  `;
}

function renderStationCard(station) {
  const monto = parseFloat(station.MONTO_CONTRACTUAL) || 0;
  const israel = parseFloat(station.HON_ISRAEL) || 0;
  const cesar = parseFloat(station.HON_CESAR) || 0;
  const utilidadSinCesar = monto - israel;
  const utilidadConCesar = monto - israel - cesar;
  const dias = parseInt(station.DIAS) || 0;
  const fechaInicio = formatDate(station.FECHA_INICIO);
  const fechaFin = formatDate(station.FECHA_FIN);
  
  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-name">${station.NOMBRE_ESTACION}</div>
          <div class="card-city">${station.CIUDAD} · ${station.CODIGO_CLIENTE}</div>
        </div>
        <div class="card-dates">
          <div class="days">${dias}</div>
          <div class="days-label">días</div>
          <div class="date-range">${fechaInicio} – ${fechaFin}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="data-row" style="grid-template-columns: repeat(4,1fr) 220px;">
          <div class="data-item">
            <div class="data-label">Monto Contractual</div>
            <div class="data-value mid">${formatCurrency(monto)}</div>
          </div>
          <div class="data-item">
            <div class="data-label">Hon. Israel</div>
            <div class="data-value mid">${formatCurrency(israel)}</div>
          </div>
          <div class="data-item">
            <div class="data-label">Utilidad sin César</div>
            <div class="data-value green">${formatCurrency(utilidadSinCesar)}</div>
          </div>
          <div class="data-item">
            <div class="data-label">Utilidad con César</div>
            <div class="data-value green">${formatCurrency(utilidadConCesar)}</div>
          </div>
          <div class="data-item" style="border-right:none;">
            <div class="status-label-text">Estatus</div>
            <div class="status-badge ${getStatusClass(station.ESTATUS)}">${station.ESTATUS || 'Sin iniciar'}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════

let currentBlockIndex = 0;

function switchBlock(index) {
  // Ocultar todas las páginas
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  
  // Mostrar página seleccionada
  document.getElementById(`page-${index}`).classList.add('active');
  
  // Actualizar botones de navegación
  document.querySelectorAll('.nav-block-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  
  currentBlockIndex = index;
}

// ═══════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════════════

async function init() {
  try {
    // Validar configuración
    if (CONFIG.SHEET_ID === '14w-qDQ6ocCSzkKweYEh2Dl5ipD0GYLe8xSOZpa66Ias') {
      throw new Error('Por favor configura el SHEET_ID en el archivo HTML (línea ~500)');
    }
    
    // Cargar datos
    const blocks = await loadAllData();
    
    // Renderizar navegación
    renderNavigation(blocks);
    
    // Renderizar páginas
    const contentContainer = document.getElementById('contentContainer');
    contentContainer.innerHTML = blocks.map((block, index) => renderBlockPage(block, index)).join('');
    
    // Mostrar interfaz
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('navBar').style.display = 'flex';
    
  } catch (error) {
    console.error('Initialization error:', error);
    
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMessage').innerHTML = `
      <strong>Error:</strong> ${error.message}<br><br>
      <strong>Pasos para solucionar:</strong><br>
      1. Verifica que el SHEET_ID esté configurado correctamente en el código HTML<br>
      2. Asegúrate de que el Google Sheet esté compartido públicamente (Cualquiera con el enlace puede VER)<br>
      3. Verifica que los nombres de las pestañas sean exactamente: CONFIG_BLOQUES, BLOQUE_MOBIL, BLOQUE_VALERO, CATALOGO_ESTATUS<br>
      4. Revisa la consola del navegador (F12) para más detalles del error
    `;
  }
}

// Ejecutar al cargar la página
window.addEventListener('DOMContentLoaded', init);

</script>
